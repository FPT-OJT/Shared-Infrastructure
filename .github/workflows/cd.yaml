name: Shared Infrastructure CD Flow

on:
  workflow_run:
    workflows: ["Shared Infrastructure CI Flow"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy-to-production:
    name: Deploy Shared Infrastructure to Production Server
    runs-on: ubuntu-latest

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Execute Deployment via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /Users/hork/Downloads/GitOps-Manifest/
            gmake up-infra
